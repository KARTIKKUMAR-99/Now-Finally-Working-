<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NexusAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#6d28d9;--p2:#7c3aed;--pl:rgba(109,40,217,.15);--pl2:rgba(109,40,217,.08);
  --g:#10b981;--b:#3b82f6;--y:#f59e0b;--r:#ef4444;
  --bg:#07070e;--c1:#0e0e1a;--c2:#141422;--c3:#1c1c2e;--c4:#252538;
  --ln:#252538;--ln2:#333348;
  --t1:#eeeeff;--t2:#7070a0;--t3:#35354a;
  --ff:'Sora',sans-serif;--fm:'JetBrains Mono',monospace;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input,textarea,select{font-family:var(--ff)}
button{cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--c4);border-radius:9px}
.hide{display:none!important}
.scr{display:none}
.scr.on{display:flex}

/* ── AUTH ── */
#AUTH{min-height:100vh;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 90% 60% at 50% -10%,rgba(109,40,217,.3),transparent 65%)}
.abox{width:100%;max-width:390px;background:var(--c1);border:1px solid var(--ln);border-radius:var(--r20);padding:32px;animation:fadeUp .5s ease}
.alogo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.alogo-icon{width:44px;height:44px;border-radius:var(--r12);background:linear-gradient(135deg,var(--p),#4338ca);display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(109,40,217,.5);flex-shrink:0}
.alogo-text{font-size:22px;font-weight:800;letter-spacing:-.5px}
.atab-wrap{display:flex;background:var(--bg);border:1px solid var(--ln);border-radius:var(--r12);padding:3px;margin-bottom:20px}
.atab{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;text-align:center;transition:.2s}
.atab.on{background:var(--c3);color:var(--t1)}
.fgrp{margin-bottom:13px}
.flbl{display:block;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.finp{width:100%;padding:11px 14px;background:var(--c2);border:1.5px solid var(--ln);border-radius:var(--r12);font-size:14px;color:var(--t1);transition:.2s;outline:none}
.finp:focus{border-color:var(--p2);box-shadow:0 0 0 3px var(--pl2)}
.finp::placeholder{color:var(--t3)}
.abtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),#4338ca);color:#fff;font-size:14px;font-weight:700;border-radius:var(--r12);margin-top:8px;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;font-family:var(--ff)}
.abtn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 28px rgba(109,40,217,.4)}
.abtn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.aerr{padding:11px 13px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--r8);font-size:12.5px;color:#fca5a5;margin-bottom:14px}
.ahint{margin-top:14px;padding:12px 14px;background:var(--pl2);border:1px solid var(--pl);border-radius:var(--r12);font-size:12px;color:var(--t2);line-height:1.8}

/* ── APP ── */
#APP{flex-direction:row;min-height:100vh}
#SB{width:220px;min-width:220px;background:var(--c1);border-right:1px solid var(--ln);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;z-index:100;transition:transform .28s cubic-bezier(.4,0,.2,1)}
#MAIN{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:hidden}
#TB{height:54px;background:var(--c1);border-bottom:1px solid var(--ln);display:flex;align-items:center;padding:0 18px;gap:8px;position:sticky;top:0;z-index:50;flex-shrink:0}
#PG{flex:1;overflow-y:auto;padding:22px;overflow-x:hidden}
#VEIL{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99;backdrop-filter:blur(3px)}
#VEIL.on{display:block}

/* SIDEBAR */
.sb-logo{padding:14px 12px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:9px}
.sb-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--p),#4338ca);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:6px}
.sec{font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:14px 10px 5px}
.nv{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:var(--r8);font-size:12.5px;font-weight:500;color:var(--t2);cursor:pointer;transition:.15s;text-align:left;border:none;font-family:var(--ff);position:relative}
.nv:hover{background:var(--c2);color:var(--t1)}
.nv.on{background:var(--pl);color:var(--p2);font-weight:700}
.nv.on::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:2.5px;background:var(--p2);border-radius:0 3px 3px 0}
.chip{margin-left:auto;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;background:rgba(16,185,129,.15);color:var(--g)}
.sb-foot{padding:8px 6px 12px;border-top:1px solid var(--ln)}
.sb-user{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--r8);transition:.15s}
.sb-user:hover{background:var(--c2)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;color:#fff;background:linear-gradient(135deg,var(--p),#4338ca);user-select:none}

/* TOPBAR */
.ib{width:34px;height:34px;border-radius:var(--r8);display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;transition:.15s;border:none;background:none}
.ib:hover{background:var(--c2);color:var(--t1)}

/* CARDS */
.card{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r16)}
.cp{padding:20px}
.ch{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:15px;display:flex;align-items:center;gap:7px}

/* STATS */
.sc{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r12);padding:17px}
.sv{font-size:26px;font-weight:800;line-height:1.1}
.sl{font-size:11.5px;color:var(--t2);margin-top:5px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:var(--r8);font-size:13px;font-weight:600;padding:9px 16px;cursor:pointer;border:none;transition:.18s;white-space:nowrap;font-family:var(--ff)}
.btn:disabled{opacity:.38;cursor:not-allowed!important;pointer-events:none}
.bp{background:linear-gradient(135deg,var(--p),#4338ca);color:#fff}
.bp:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(109,40,217,.4)}
.bs{background:var(--c2);color:var(--t1);border:1.5px solid var(--ln)}
.bs:not(:disabled):hover{border-color:var(--p2);color:var(--p2)}
.bg{background:rgba(16,185,129,.12);color:var(--g);border:1.5px solid rgba(16,185,129,.3)}
.bd{background:rgba(239,68,68,.1);color:#fca5a5;border:1.5px solid rgba(239,68,68,.25)}
.bd:not(:disabled):hover{background:var(--r);color:#fff}
.sm{padding:6px 13px;font-size:12px;border-radius:7px}
.xs{padding:4px 10px;font-size:11px;border-radius:6px}

/* FORM */
.lbl{display:block;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.inp{width:100%;padding:10px 13px;background:var(--c2);border:1.5px solid var(--ln);border-radius:var(--r12);font-size:13.5px;color:var(--t1);transition:.2s;display:block;outline:none;font-family:var(--ff)}
.inp:focus{border-color:var(--p2);box-shadow:0 0 0 3px var(--pl2)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:88px;line-height:1.65}
select.inp{cursor:pointer;-webkit-appearance:none}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.bv{background:var(--pl);color:var(--p2);border:1px solid var(--pl)}
.bge{background:rgba(16,185,129,.12);color:var(--g);border:1px solid rgba(16,185,129,.25)}
.bbl{background:rgba(59,130,246,.12);color:var(--b);border:1px solid rgba(59,130,246,.25)}
.byl{background:rgba(245,158,11,.12);color:var(--y);border:1px solid rgba(245,158,11,.25)}
.brl{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.bk{background:var(--c3);color:var(--t2);border:1px solid var(--ln)}

/* TABS */
.tabs{display:flex;background:var(--c2);border:1px solid var(--ln);border-radius:var(--r12);padding:3px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;margin-bottom:18px;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;transition:.15s;flex-shrink:0;border:none;font-family:var(--ff);background:none}
.tab:hover{color:var(--t1)}
.tab.on{background:var(--c3);color:var(--p2)}
.pane{display:none}.pane.on{display:block}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* PROGRESS */
.pb{height:5px;background:var(--c3);border-radius:99px;overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}

/* TOGGLE */
.tgl{position:relative;width:38px;height:22px;display:inline-block;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:var(--c3);border-radius:99px;cursor:pointer;transition:.2s;border:1px solid var(--ln)}
.tsl::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--t2);top:2px;left:2px;transition:.2s}
.tgl input:checked+.tsl{background:var(--pl);border-color:var(--p2)}
.tgl input:checked+.tsl::before{transform:translateX(16px);background:var(--p2)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--ln);background:var(--c2)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--ln);color:var(--t1);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--pl2)}
.ox{overflow-x:auto;border-radius:var(--r16)}

/* CHAT */
.chat{display:flex;flex-direction:column;height:520px;border:1px solid var(--ln);border-radius:var(--r16);overflow:hidden;background:var(--bg)}
.chat-hd{padding:13px 17px;background:var(--c2);border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:11px;flex-shrink:0}
.chat-bd{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px}
.chat-ft{padding:11px 13px;background:var(--c2);border-top:1px solid var(--ln);display:flex;gap:9px;flex-shrink:0;align-items:center}
.msg{max-width:86%}
.msg.me{align-self:flex-end}.msg.ai{align-self:flex-start}
.bub{padding:11px 15px;border-radius:14px;font-size:13.5px;line-height:1.7;word-break:break-word}
.msg.me .bub{background:linear-gradient(135deg,var(--p),#4338ca);color:#fff;border-bottom-right-radius:4px;font-weight:500}
.msg.ai .bub{background:var(--c2);border:1px solid var(--ln);color:var(--t1);border-bottom-left-radius:4px;white-space:pre-wrap}
.dots{display:flex;gap:4px;padding:4px 2px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--p2);animation:dp 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* OUTPUT BOX */
.aio{background:var(--c2);border:1px solid var(--ln);border-radius:var(--r12);padding:18px;font-size:13.5px;line-height:1.8;color:var(--t1);white-space:pre-wrap;max-height:520px;overflow-y:auto}

/* TOAST */
#TOASTS{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.tst{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r12);padding:11px 14px;box-shadow:0 12px 32px rgba(0,0,0,.6);display:flex;align-items:center;gap:8px;min-width:240px;max-width:320px;pointer-events:all;animation:slIn .22s ease}
@keyframes slIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tmsg{flex:1;font-size:13px;font-weight:500}
.tcl{color:var(--t3);cursor:pointer;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:13px}
.tcl:hover{background:var(--c2);color:var(--t1)}

/* MODAL */
#MOD{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:600;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;backdrop-filter:blur(5px)}
#MOD.on{display:flex}
.mbox{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r20);width:100%;max-width:560px;animation:popIn .22s ease;margin:auto}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--ln)}
.mbd{padding:20px}

/* INVOICE */
.icard{background:var(--c1);border:1px solid var(--ln);border-radius:var(--r16);padding:26px}
.itotal{background:linear-gradient(135deg,var(--p),#4338ca);color:#fff;border-radius:var(--r12);padding:16px 20px;margin-top:14px;text-align:right}

/* WORKFLOW STEP */
.step-pill{display:inline-flex;align-items:center;gap:5px;background:var(--pl);border:1px solid rgba(109,40,217,.25);color:var(--p2);border-radius:99px;padding:3px 10px;font-size:11.5px;font-weight:600}
.step-num{width:15px;height:15px;border-radius:50%;background:var(--p2);color:#fff;font-size:8px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

/* RECORDING */
.rec-btn{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.2s;cursor:pointer;border:none;flex-shrink:0}
.rec-btn.idle{background:linear-gradient(135deg,var(--p),#4338ca);box-shadow:0 8px 26px rgba(109,40,217,.45)}
.rec-btn.recording{background:var(--r);box-shadow:0 8px 26px rgba(239,68,68,.5);animation:rPulse 1.1s infinite}
@keyframes rPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.ripple{position:absolute;width:84px;height:84px;border-radius:50%;border:2px solid var(--r);animation:rippleAnim 1.1s infinite;opacity:0}
@keyframes rippleAnim{0%{opacity:.8;transform:scale(.85)}100%{opacity:0;transform:scale(1.4)}}
.puls{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulsAnim 2s infinite}
@keyframes pulsAnim{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}60%{box-shadow:0 0 0 5px transparent}}

/* ANIMS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .3s ease}

/* RESPONSIVE */
@media(max-width:900px){
  #SB{position:fixed;left:0;top:0;height:100vh;transform:translateX(-100%)}
  #SB.open{transform:translateX(0)}
  #PG{padding:14px}
  .g4{grid-template-columns:1fr 1fr}
}
@media(max-width:620px){
  .g4,.g3,.g2{grid-template-columns:1fr}
  #PG{padding:11px}
  .tabs{padding:3px;gap:1px}
  .tab{padding:7px 11px;font-size:12px}
  .chat{height:420px}
}
@media print{#SB,#TB,#TOASTS,#MOD,.btn,#MB{display:none!important}#PG{padding:0}#MAIN{display:block}}
</style>
</head>
<body>
<div id="TOASTS"></div>
<div id="MOD" onclick="if(event.target===this)cMod()">
  <div class="mbox">
    <div class="mhd">
      <span id="MT" style="font-size:14px;font-weight:700"></span>
      <button class="ib xs" onclick="cMod()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mbd" id="MB"></div>
  </div>
</div>

<!-- AUTH -->
<div id="AUTH" class="scr on">
  <div class="abox">
    <div class="alogo">
      <div class="alogo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24A2.5 2.5 0 0 1 9.5 2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24A2.5 2.5 0 0 0 14.5 2z"/></svg>
      </div>
      <div><div class="alogo-text">Nexus<span style="color:var(--p2)">AI</span></div><div style="font-size:11px;color:var(--t3);margin-top:-1px">Complete AI Business Suite</div></div>
    </div>
    <div class="atab-wrap">
      <div class="atab on" id="AT0" onclick="swAuth(0)">Sign In</div>
      <div class="atab" id="AT1" onclick="swAuth(1)">Sign Up</div>
    </div>
    <div id="AER" class="aerr" style="display:none"></div>
    <div id="ANM" class="fgrp" style="display:none"><label class="flbl">Full Name</label><input class="finp" id="anm" type="text" placeholder="Your name"></div>
    <div class="fgrp"><label class="flbl">Email</label><input class="finp" id="aem" type="email" value="demo@nexusai.com"></div>
    <div class="fgrp"><label class="flbl">Password</label><input class="finp" id="apw" type="password" value="demo123"></div>
    <button class="abtn" id="ABTN" onclick="doAuth()"><span id="ABL">Sign In</span></button>
    <div class="ahint"><b>Demo:</b> demo@nexusai.com / demo123 &nbsp;•&nbsp; <b>Admin:</b> admin@nexusai.com / admin123</div>
  </div>
</div>

<!-- APP -->
<div id="APP" class="scr">
  <div id="VEIL" onclick="sbClose()"></div>
  <aside id="SB">
    <div class="sb-logo">
      <div class="sb-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.3"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24A2.5 2.5 0 0 1 9.5 2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24A2.5 2.5 0 0 0 14.5 2z"/></svg></div>
      <span style="font-size:15px;font-weight:800">NexusAI<span style="color:var(--p2)">.</span></span>
    </div>
    <nav class="sb-nav">
      <div class="sec">Main</div>
      <button class="nv on" data-p="dash" onclick="go('dash')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard

// AI ENGINE — Multiple endpoints with auto-fallback
// Primary:   https://text.pollinations.ai/openai  (POST)

// Images:    https://image.pollinations.ai/prompt/ (GET, no CORS ever)

async function AI(prompt, sys, maxTok) {
  // Try OpenAI-compatible endpoint first
  try {
    const msgs = [];
    if (sys) msgs.push({ role:'system', content:sys });
    msgs.push({ role:'user', content:prompt });
    const r = await fetch('https://text.pollinations.ai/openai', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'openai', messages:msgs, max_tokens:maxTok||1200, seed:Math.random()*99999|0 }),
      signal: AbortSignal.timeout(30000)
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const t = d?.choices?.[0]?.message?.content;
    if (!t) throw new Error('empty');
    return t.trim();
  } catch(e1) {
    // Fallback: GET endpoint (plain text, always works)
    try {
      const full = sys ? sys+'\n\n'+prompt : prompt;
      const r2 = await fetch('https://text.pollinations.ai/'+encodeURIComponent(full)+'?model=openai&seed='+(Math.random()*99999|0), {
        signal: AbortSignal.timeout(30000)
      });
      if (!r2.ok) throw new Error('HTTP '+r2.status);
      const t2 = await r2.text();
      if (!t2 || t2.length < 5) throw new Error('empty');
      return t2.trim();
    } catch(e2) {
      throw new Error('AI unavailable. Check internet. ('+e2.message+')');
    }
  }
}

async function AIChat(messages) {
  try {
    const r = await fetch('https://text.pollinations.ai/openai', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'openai', messages, max_tokens:900, seed:Math.random()*99999|0 }),
      signal: AbortSignal.timeout(30000)
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const t = d?.choices?.[0]?.message?.content;
    if (!t) throw new Error('empty');
    return t.trim();
  } catch(e) {
    // Fallback: use last user message
    const last = messages.filter(m=>m.role==='user').pop();
    if (last) return await AI(last.content, messages.find(m=>m.role==='system')?.content);
    throw new Error('Chat failed: '+e.message);
  }
}

// SPEECH ANALYSIS
function analyzeText(txt,dur){
  const words=txt.trim().split(/\s+/).filter(Boolean); const wc=words.length; if(wc<4)return null;
  const sents=Math.max((txt.match(/[.!?]+/g)||[]).length,1);
  const low=txt.toLowerCase(); const fm={}; let tf=0;
  FILLERS.forEach(f=>{ const re=new RegExp('(?:^|\\s)'+f.replace(/\s+/g,'\\s+')+'(?:\\s|$|[,.]|$)','gi');
    const m=(low.match(re)||[]).length; if(m>0){fm[f]=m;tf+=m;} });
  const mins=dur?dur/60:Math.max(wc/140,.1); const wpm=Math.round(wc/mins);
  const uniq=new Set(words.map(w=>w.toLowerCase().replace(/[^a-z]/g,''))).size;
  const vs=clamp(Math.round(uniq/Math.max(wc,1)*145),0,100);
  const cs=clamp(Math.round(100-(tf/Math.max(wc,1))*500),0,100);
  const ss=wpm>=120&&wpm<=165?100:wpm>=95&&wpm<=190?72:45;
  const ts=clamp(sents>=6?90:sents>=4?72:sents>=2?55:38,0,100);
  const ov=Math.round(cs*.35+ss*.25+vs*.25+ts*.15);
  const grade=ov>=85?'Excellent':ov>=70?'Good':ov>=55?'Average':'Needs Work';
  const gc=ov>=85?'bge':ov>=70?'bbl':ov>=55?'byl':'brl';
  return {wc,sents,wpm,fm,tf,fr:(tf/Math.max(wc,1)*100).toFixed(1),vs,cs,ss,ts,ov,grade,gc};
}

  const td=document.createElement('div'); td.className='msg ai'; td.id='TYP';
  td.innerHTML='<div class="bub"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  body.appendChild(td); body.scrollTop=body.scrollHeight;
  try{
    const sys={role:'system',content:`You are a helpful AI business assistant. Be concise and practical. User: ${ST.user?.name} (${ST.user?.plan} plan).`};
    const reply=await AIChat([sys,...ST.chatMsgs.slice(-14)]);
    G('TYP')?.remove(); addBub(body,'ai',reply);
    ST.chatMsgs.push({role:'assistant',content:reply});

    G('TYP')?.remove();

}

    pitch:`Write elevator pitches for: ${p}\n\n30-second pitch:\n[here]\n\n60-second pitch:\n[here]\n\nBoth: hook → problem → solution → value → CTA`,

    cold:`Write a cold email for: ${p}\nPersonalized opener, value prop, social proof, soft CTA, P.S. Under 150 words.`
  };

// RECORDING — works in Chrome/Firefox/Edge
async function toggleRec(){
  if(ST.recording)stopRec(); else await startRec();
}

async function startRec(){
  try{
    if(!navigator.mediaDevices?.getUserMedia){toast('Recording not supported — use Chrome/Firefox','error');return;}
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    ST.recChunks=[];
    const opts=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?{mimeType:'audio/webm;codecs=opus'}:{};
    ST.recorder=new MediaRecorder(stream,opts);
    ST.recorder.ondataavailable=e=>{if(e.data?.size>0)ST.recChunks.push(e.data);};
    ST.recorder.onstop=onRecStop;
    ST.recorder.start(100); ST.recording=true; ST.recSecs=0;
    // UI
    const btn=G('RECBTN'),ico=G('RECICO'),rip=G('RIPPLE'),st=G('RECST'),tm=G('RECTM'),wv=G('RECWAVE');
    if(btn){btn.classList.remove('idle');btn.classList.add('recording');}
    if(ico)ico.innerHTML='<rect x="6" y="6" width="12" height="12" rx="2" fill="#fff"/>';
    if(rip)rip.style.display='block';
    if(st)st.innerHTML='<span style="color:var(--r);font-weight:700">● Recording…</span>';
    if(tm)tm.style.display='block';
    if(wv)wv.style.display='flex';
    ST.recTimer=setInterval(()=>{
      ST.recSecs++;const m=Math.floor(ST.recSecs/60),s=ST.recSecs%60;
      const t=G('RECTM'); if(t)t.textContent=m+':'+(s<10?'0'+s:s);
    },1000);
    toast('Recording… Speak now 🎙️','info');
  }catch(e){
    toast(e.name==='NotAllowedError'?'Microphone denied — allow in browser settings':'Mic error: '+e.message,'error');
  }
}

function stopRec(){
  if(!ST.recording||!ST.recorder)return;
  ST.recorder.stop(); ST.recorder.stream?.getTracks().forEach(t=>t.stop());
  ST.recording=false; clearInterval(ST.recTimer); ST.recDur=ST.recSecs;
  const btn=G('RECBTN'),ico=G('RECICO'),rip=G('RIPPLE'),wv=G('RECWAVE'),st=G('RECST'),tm=G('RECTM');
  if(btn){btn.classList.remove('recording');btn.classList.add('idle');}
  if(ico)ico.innerHTML='<path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>';
  if(rip)rip.style.display='none'; if(wv)wv.style.display='none';
  if(st)st.textContent='Processing…'; if(tm)tm.textContent='✓ Done';
}

function onRecStop(){
  const dur=ST.recDur; const ta=G('SPTXT');
  const st=G('RECST');
  if(st)st.innerHTML=`✅ ${dur}s recorded · Paste what you said below, then click Analyze`;
  if(ta&&!ta.value.trim()){
    ta.value=`[I recorded for ${dur} seconds — please replace this text with what I said for accurate analysis. The recording duration (${dur} seconds) will be used for WPM calculation.]`;
    ta.dispatchEvent(new Event('input'));

  toast('Recording done! Paste your speech text and click Analyze ✅');
}

function genImage() {
  const pEl = document.getElementById('IMGP');
  const prompt = (pEl ? pEl.value : '').trim();
  if (!prompt) { toast('Describe the image you want', 'error'); return; }

  const style = (document.getElementById('IMGS') || {}).value || '';
  const w = parseInt((document.getElementById('IMGW') || {}).value || '1024');
  const h = parseInt((document.getElementById('IMGH') || {}).value || '1024');
  const fullPrompt = style ? prompt + ', ' + style : prompt;

  const btn = document.getElementById('IMGBTN');
  if (btn) { btn.disabled = true; btn.innerHTML = spn(14,'#fff') + ' Generating…'; }

  const zone = document.getElementById('IMGZONE');
  if (zone) {
    zone.style.borderStyle = 'solid';
    zone.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:16px">
      ${spn(48)}
      <div>
        <div style="font-weight:700;font-size:14px;color:var(--t2);margin-bottom:6px">Creating your image…</div>
        <div style="font-size:12.5px;color:var(--t3)">Pollinations AI is generating · Usually 5–20 seconds</div>
      </div>
    </div>`;
  }

  const seed = Math.floor(Math.random() * 999999);
  const url = 'https://image.pollinations.ai/prompt/' +
    encodeURIComponent(fullPrompt) +
    '?width=' + w + '&height=' + h + '&seed=' + seed + '&nologo=true&enhance=true&safe=false';

  // Use Image() object — onload/onerror guaranteed to fire
  const img = new Image();
  img.crossOrigin = 'anonymous';

  img.onload = function() {
    const zone2 = document.getElementById('IMGZONE');
    if (zone2) {
      zone2.innerHTML = `
        <div style="width:100%">
          <img src="${url}" alt="${esc(prompt.slice(0,60))}"
            style="width:100%;max-height:580px;object-fit:contain;border-radius:14px;display:block;border:1px solid var(--ln)">
          <div style="display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;justify-content:center">
            <a href="${url}" target="_blank" download="nexusai.jpg" class="btn bp sm">⬇ Download</a>
            <a href="${url}" target="_blank" class="btn bs sm">🔍 Full Size</a>
            <button class="btn bs sm" onclick="cpTxt('${url.replace(/'/g,"\\'")}')">Copy URL</button>
            <button class="btn bs sm" onclick="document.getElementById('IMGP').value='';document.getElementById('IMGP').focus()">New</button>
          </div>
          <div style="margin-top:10px;padding:9px 13px;background:var(--c2);border-radius:9px;font-size:12px;color:var(--t2)">${esc(fullPrompt)}</div>
        </div>`;
    }
    // Gallery
    ST.imgHistory.unshift({ url, prompt: fullPrompt });
    if (ST.imgHistory.length > 8) ST.imgHistory.pop();
    renderGallery();
    toast('Image generated! 🎨');
    const b2 = document.getElementById('IMGBTN');
    if (b2) { b2.disabled = false; b2.innerHTML = '🎨 Generate Image'; }
  };

  img.onerror = function() {
    const zone3 = document.getElementById('IMGZONE');
    if (zone3) {
      zone3.innerHTML = `<div style="text-align:center;padding:32px">
        <div style="font-size:36px;margin-bottom:12px">❌</div>
        <div style="font-weight:700;color:var(--r);font-size:15px;margin-bottom:8px">Generation Failed</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:16px">Possible reasons:<br>• Slow internet<br>• Server busy (retry works)<br>• Prompt has restricted words</div>
        <button class="btn bp sm" onclick="genImage()">Try Again</button>
      </div>`;
    }
    toast('Image failed — try again or change prompt', 'error');
    const b3 = document.getElementById('IMGBTN');
    if (b3) { b3.disabled = false; b3.innerHTML = '🎨 Generate Image'; }
  };

  // Set src AFTER handlers — critical!
  img.src = url;
}

function renderGallery() {
  const gal = document.getElementById('IMGGAL');
  if (!gal || !ST.imgHistory.length) return;
  gal.innerHTML = ST.imgHistory.map(item =>
    `<div onclick="window.open('${item.url}','_blank')"
      title="${esc(item.prompt.slice(0,60))}"
      style="border-radius:9px;overflow:hidden;border:1px solid var(--ln);cursor:pointer;transition:.18s;aspect-ratio:1"
      onmouseenter="this.style.transform='scale(1.05)';this.style.borderColor='var(--p2)'"
      onmouseleave="this.style.transform='';this.style.borderColor='var(--ln)'">
      <img src="${item.url}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block">
    </div>`
  ).join('');
}

          <div style="font-size:12.5px;opacity:.85;margin-bottom:3px">Total Amount Due</div>
          <div style="font-size:30px;font-weight:900">${esc(cur)} $${parseFloat(amt).toLocaleString('en-US',{minimumFractionDigits:2})}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
          <button class="btn bp sm" onclick="window.print()">🖨 Print/PDF</button>
          <button class="btn bs sm" onclick="toast('Sent! ✉️')">Send to Client</button>
          <button class="btn bs sm" onclick="cpTxt(document.getElementById('INVPREV')?.innerText||'')">Copy Text</button>
        </div>
      </div>`;
    toast('Invoice generated! 💰');
  }catch(e){
    document.getElementById('IVZONE').innerHTML=`<div class="card cp" style="text-align:center;padding:32px;color:var(--r)">${esc(e.message)}<br><button class="btn bs sm" style="margin-top:12px" onclick="genInvoice()">Try Again</button></div>`;
    toast('Error: '+e.message,'error');
  }
  if(btn){btn.disabled=false;btn.innerHTML='💰 Generate Invoice';}
}

function saveProfile(){
  const n=(document.getElementById('SETNM')?.value||'').trim(),e=(document.getElementById('SETEM')?.value||'').trim();
  if(!n||!e){toast('Name & email required','error');return;}
  ST.user.name=n; ST.user.email=e;
  const sa=document.getElementById('SBAV'),sn=document.getElementById('SBNM'),ta=document.getElementById('TBAV');
  if(sa)sa.textContent=ini(n); if(sn)sn.textContent=n; if(ta)ta.textContent=ini(n);
  toast('Profile saved! ✅');
}
